<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <div class="logo-wrapper mb-2">
        <img 
          src="assets/logo.png" 
          alt="FlowPay Logo"
          class="login-logo"
        />
      </div>
      <p class="mb-0 mt-2 auth-tagline">
        Secure & Fast Transfers
      </p>
    </div>
    
    <div class="auth-body">
      <h4 class="text-center mb-4" style="color: var(--text-dark); font-weight: 600;">Welcome Back</h4>
      
      <div *ngIf="errorMessage" class="alert alert-wine" role="alert">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            formControlName="username"
            placeholder="Enter your username"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          />
          <div class="invalid-feedback" *ngIf="loginForm.get('username')?.errors?.['pattern']">
            Username can only contain letters and numbers.
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="loading || loginForm.invalid"
        >
          <span *ngIf="!loading">Login</span>
          <span *ngIf="loading">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Logging in...
          </span>
        </button>
      </form>
    </div>
  </div>
</div>
