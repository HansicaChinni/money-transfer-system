<app-navbar></app-navbar>
<div class="container-custom fade-in">
  <div class="row mb-4">
    <div class="col-12"><h2 class="text-primary" style="font-weight: 700;">Create New Account</h2><p class="text-muted">Set up a new account with user credentials.</p></div>
  </div>
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header"><h5 class="mb-0">Account Details</h5></div>
        <div class="card-body">
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
          <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" formControlName="username" [class.is-invalid]="createForm.get('username')?.invalid && createForm.get('username')?.touched"/>
              <div class="invalid-feedback">Username must be at least 3 characters</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" [class.is-invalid]="createForm.get('password')?.invalid && createForm.get('password')?.touched"/>
              <div class="invalid-feedback">Password must be at least 8 characters</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Account Holder Name</label>
              <input type="text" class="form-control" formControlName="holderName" [class.is-invalid]="createForm.get('holderName')?.invalid && createForm.get('holderName')?.touched"/>
              <div class="invalid-feedback">Holder name is required</div>
            </div>
            <div class="mb-4">
              <label class="form-label">Initial Balance ($)</label>
              <input type="number" step="0.01" class="form-control" formControlName="initialBalance" [class.is-invalid]="createForm.get('initialBalance')?.invalid && createForm.get('initialBalance')?.touched"/>
              <div class="invalid-feedback">Balance cannot be negative</div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="loading || createForm.invalid">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Creating...</span>
              </button>
              <button type="button" class="btn btn-outline-secondary" routerLink="/admin/accounts">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
