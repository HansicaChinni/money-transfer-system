<app-navbar></app-navbar>
<div class="container-custom fade-in">
  <div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
      <div>
        <h2 class="text-primary" style="font-weight: 700;">All Accounts</h2>
        <p class="text-muted">Manage all system accounts.</p>
      </div>
      <a routerLink="/admin/create-account" class="btn btn-secondary">Create New Account</a>
    </div>
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>
  <div *ngIf="!loading" class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr><th>Account ID</th><th class="text-end">Balance</th><th>Status</th><th>Last Updated</th><th>Actions</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let account of accounts">
              <td><strong>#{{ account.id }}</strong></td>
              <td class="text-end">${{ account.balance | number:'1.2-2' }}</td>
              <td><span class="badge {{ getStatusBadgeClass(account.status) }}">{{ account.status }}</span></td>
              <td>{{ account.lastUpdated | date:'medium' }}</td>
              <td><a [routerLink]="['/admin/accounts', account.id]" class="btn btn-sm btn-outline-primary">View Details</a></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
