<nav class="app-sidebar" aria-label="Primary navigation">
  <a class="sidebar-brand" routerLink="/">
    <span class="brand-mark">
      <img src="assets/logo1.png" alt="FlowPay Logo" class="navbar-logo" />
    </span>
    <span>
      <span class="brand-text">FlowPay</span>
      <small>Money Transfer</small>
    </span>
  </a>

  <div class="sidebar-section">
    <span class="sidebar-label">Menu</span>

    <ul class="sidebar-nav" *ngIf="isAdmin">
      <li>
        <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/admin/accounts" routerLinkActive="active">Accounts</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/admin/transactions" routerLinkActive="active">Transactions</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/admin/rewards" routerLinkActive="active">Rewards</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/admin/create-account" routerLinkActive="active">Create Account</a>
      </li>
    </ul>

    <ul class="sidebar-nav" *ngIf="!isAdmin">
      <li>
        <a class="nav-link" routerLink="/user/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/user/transfer" routerLinkActive="active">Transfer</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/user/transactions" routerLinkActive="active">Transactions</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/user/rewards" routerLinkActive="active">Rewards</a>
      </li>
      <li>
        <a class="nav-link" routerLink="/user/profile" routerLinkActive="active">Profile</a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="user-chip" *ngIf="currentUser">
      <span class="user-avatar">{{ isAdmin ? 'A' : 'U' }}</span>
      <span>
        <strong>{{ isAdmin ? 'Admin' : 'User' }} Portal</strong>
        <small>Account {{ currentUser.accountId || 'management' }}</small>
      </span>
    </div>

    <button class="btn logout-btn" type="button" (click)="logout()">Logout</button>
  </div>
</nav>
