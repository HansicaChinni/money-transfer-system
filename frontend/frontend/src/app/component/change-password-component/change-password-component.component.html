<div class="change-password-wrapper">
  <div class="change-password-layout">
    <mat-card class="change-password-card">
      <mat-card-header>
        <div class="header-icon">
          <mat-icon>lock_reset</mat-icon>
        </div>
        <mat-card-title>Change Password</mat-card-title>
        <mat-card-subtitle>
          Update your credentials to keep your account secure.
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div *ngIf="errorMessage" class="alert error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <div *ngIf="successMessage" class="alert success">
          <mat-icon>check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="form">
          <mat-form-field appearance="outline">
            <mat-label>Current password</mat-label>
            <input
              matInput
              [type]="hideCurrent ? 'password' : 'text'"
              formControlName="currentPassword"
            >
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="toggleCurrent()"
            >
              <mat-icon>{{ hideCurrent ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('currentPassword')?.hasError('required')">
              Current password is required.
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>New password</mat-label>
            <input
              matInput
              [type]="hideNew ? 'password' : 'text'"
              formControlName="newPassword"
            >
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="toggleNew()"
            >
              <mat-icon>{{ hideNew ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('newPassword')?.hasError('required')">
              New password is required.
            </mat-error>
            <mat-error *ngIf="form.get('newPassword')?.hasError('minlength')">
              Password must be at least 8 characters long.
            </mat-error>
          </mat-form-field>

          <div class="form-actions">
            <button
              mat-raised-button
              color="primary"
              type="submit"
              [disabled]="loading || form.invalid"
            >
              <mat-progress-spinner
                *ngIf="loading"
                diameter="20"
                mode="indeterminate"
              ></mat-progress-spinner>
              <span *ngIf="!loading">Update password</span>
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
