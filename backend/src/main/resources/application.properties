
spring.application.name=draft

# --- Datasource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/bankdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Cloud@123$
# Optional, Boot can infer from URL; safe to omit:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Hibernate 6 slow query logging (duration in ms)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=50

# Optional: SQL and bind params (noisy; use carefully)
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# --- JWT ---
# Use a Base64-encoded key that decodes to >= 256 bits for HS256
app.jwt.secret=Rlm0XHwlNvqvBlGq8YcEzRfwpyOX6DPDI+92isU+gK4=
app.jwt.expiration-ms=86400000

# --- Security (dev) ---
logging.level.org.springframework.security=DEBUG
